<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📡 PeerShare – Video, File & Voice</title>
  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #1a1a2e;
      color: #eee;
      margin: 0;
      padding: 20px;
      display: flex;
      justify-content: center;
    }
    .app {
      max-width: 1000px;
      width: 100%;
    }
    .card {
      background: #16213e;
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 20px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }
    h1, h2, h3 { margin-top: 0; }
    .flex { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
    input, button, select {
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      background: #0f3460;
      color: #fff;
    }
    button {
      background: #e94560;
      cursor: pointer;
      font-weight: 600;
      transition: 0.2s;
    }
    button:hover { filter: brightness(1.2); }
    button.secondary { background: #533483; }
    button.success { background: #2ecc71; }
    button.danger { background: #c0392b; }
    button.voice { background: #f39c12; }
    button.voice.active { background: #2ecc71; }
    button.mute { background: #e67e22; }
    video {
      width: 100%;
      max-width: 800px;
      border-radius: 12px;
      background: #0a0a1a;
      display: block;
    }
    video:fullscreen {
      width: 100vw;
      height: 100vh;
      max-width: 100vw;
      max-height: 100vh;
      object-fit: contain;
      border-radius: 0;
      background: #000;
    }
    .chat-box {
      height: 200px;
      overflow-y: auto;
      border: 1px solid #2d3b5a;
      border-radius: 8px;
      padding: 10px;
      margin: 10px 0;
      background: #0f1a30;
    }
    .chat-box div { padding: 4px 0; border-bottom: 1px solid #1f2a44; }
    .file-download {
      display: inline-block;
      background: #2ecc71;
      color: #000;
      padding: 4px 12px;
      border-radius: 4px;
      margin: 4px 0;
      text-decoration: none;
      font-size: 0.9rem;
    }
    .status { color: #f1c40f; font-weight: bold; }
    .hidden { display: none; }
    .peer-id-display {
      background: #0f1a30;
      padding: 8px 16px;
      border-radius: 8px;
      font-family: monospace;
      font-size: 1.2rem;
      border: 1px solid #2ecc71;
      display: inline-block;
    }
    .video-wrapper {
      position: relative;
      display: inline-block;
      width: 100%;
      max-width: 800px;
    }
    #fullscreenBtn {
      position: absolute;
      bottom: 16px;
      right: 16px;
      background: rgba(0,0,0,0.75);
      border: 2px solid #fff;
      color: #fff;
      padding: 10px 18px;
      font-size: 1.2rem;
      border-radius: 10px;
      cursor: pointer;
      z-index: 20;
      backdrop-filter: blur(4px);
      transition: 0.2s;
    }
    #fullscreenBtn:hover {
      background: rgba(255,255,255,0.2);
      border-color: #2ecc71;
    }
    label { display: flex; align-items: center; gap: 6px; cursor: pointer; }
    input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; }
    .viewer-list { margin: 10px 0; }
    .viewer-item { background: #0f1a30; padding: 6px 12px; border-radius: 6px; margin: 4px 0; display: flex; justify-content: space-between; align-items: center; }
  </style>
</head>
<body>
<div class="app">

  <!-- Home -->
  <div id="home" class="card">
    <h1>📡 PeerShare</h1>
    <p>Choose your role. The <strong>Host</strong> shares their camera/screen. <strong>Viewers</strong> watch and can voice chat.</p>
    <div class="flex">
      <button id="btnHost" class="success">🎥 Start Hosting</button>
      <button id="btnViewer" class="secondary">👀 Join as Viewer</button>
    </div>
  </div>

  <!-- Host Panel -->
  <div id="hostPanel" class="card hidden">
    <h2>🎥 Hosting</h2>
    <div class="flex" style="margin-bottom: 12px;">
      <span>Your Peer ID:</span>
      <span id="hostPeerIdDisplay" class="peer-id-display">---</span>
      <button id="copyPeerId" class="secondary">📋 Copy</button>
      <button id="stopHost" class="danger">⏹ Stop Hosting</button>
    </div>
    <div class="flex">
      <button id="startCam" class="success">📷 Start Camera &amp; Mic</button>
      <label>
        <input type="checkbox" id="highQualityScreen"> 🔥 1080p60
      </label>
      <button id="startScreen" class="secondary">🖥 Share Screen</button>
      <button id="muteAllAudio" class="mute">🔇 Mute All Audio</button>
    </div>
    <video id="localVideo" autoplay muted playsinline></video>
    <div>
      <h3>Viewers connected: <span id="viewerCount">0</span></h3>
      <div id="viewerList" class="viewer-list"></div>
    </div>
    <div>
      <h3>Chat</h3>
      <div id="hostChat" class="chat-box"></div>
      <div class="flex">
        <input type="text" id="hostChatInput" placeholder="Type a message...">
        <button id="hostSendChat">Send</button>
      </div>
    </div>
    <div>
      <h3>Send a File</h3>
      <div class="flex">
        <input type="file" id="hostFileInput">
        <button id="hostSendFile">📤 Send</button>
      </div>
    </div>
  </div>

  <!-- Viewer Panel -->
  <div id="viewerPanel" class="card hidden">
    <h2>👀 Watching</h2>
    <div class="flex">
      <label>Host Peer ID:</label>
      <input type="text" id="hostIdInput" placeholder="e.g. abc123" value="">
      <button id="connectBtn" class="success">🔗 Connect</button>
      <button id="disconnectBtn" class="danger">⏹ Disconnect</button>
    </div>
    <div class="video-wrapper">
      <video id="remoteVideo" autoplay playsinline></video>
      <button id="fullscreenBtn">⛶ Full Screen</button>
    </div>
    <div class="flex">
      <button id="voiceChatBtn" class="voice">🎤 Voice Chat</button>
    </div>
    <div>
      <h3>Chat</h3>
      <div id="viewerChat" class="chat-box"></div>
      <div class="flex">
        <input type="text" id="viewerChatInput" placeholder="Type a message...">
        <button id="viewerSendChat">Send</button>
      </div>
    </div>
    <div>
      <h3>Send a File</h3>
      <div class="flex">
        <input type="file" id="viewerFileInput">
        <button id="viewerSendFile">📤 Send</button>
      </div>
    </div>
  </div>

  <div id="status" class="status"></div>
</div>

<script>
  // ---------- Global state ----------
  let peer = null;
  let connections = [];          // data connections (viewers)
  let localStream = null;        // host's outgoing video/audio
  let isHost = false;

  // For voice chat (host side)
  let audioCalls = new Map();    // viewerPeerId -> MediaConnection (audio)
  let audioStreams = new Map();  // viewerPeerId -> MediaStream (for muting)

  // DOM refs
  const home = document.getElementById('home');
  const hostPanel = document.getElementById('hostPanel');
  const viewerPanel = document.getElementById('viewerPanel');
  const statusEl = document.getElementById('status');

  const hostPeerIdDisplay = document.getElementById('hostPeerIdDisplay');
  const copyPeerIdBtn = document.getElementById('copyPeerId');
  const stopHostBtn = document.getElementById('stopHost');
  const startCamBtn = document.getElementById('startCam');
  const startScreenBtn = document.getElementById('startScreen');
  const localVideo = document.getElementById('localVideo');
  const viewerCount = document.getElementById('viewerCount');
  const viewerList = document.getElementById('viewerList');

  const hostChat = document.getElementById('hostChat');
  const hostChatInput = document.getElementById('hostChatInput');
  const hostSendChat = document.getElementById('hostSendChat');
  const hostFileInput = document.getElementById('hostFileInput');
  const hostSendFile = document.getElementById('hostSendFile');

  const hostIdInput = document.getElementById('hostIdInput');
  const connectBtn = document.getElementById('connectBtn');
  const disconnectBtn = document.getElementById('disconnectBtn');
  const remoteVideo = document.getElementById('remoteVideo');
  const viewerChat = document.getElementById('viewerChat');
  const viewerChatInput = document.getElementById('viewerChatInput');
  const viewerSendChat = document.getElementById('viewerSendChat');
  const viewerFileInput = document.getElementById('viewerFileInput');
  const viewerSendFile = document.getElementById('viewerSendFile');
  const fullscreenBtn = document.getElementById('fullscreenBtn');
  const highQualityScreen = document.getElementById('highQualityScreen');
  const voiceChatBtn = document.getElementById('voiceChatBtn');
  const muteAllAudioBtn = document.getElementById('muteAllAudio');

  // Utility: display status
  function setStatus(msg) {
    statusEl.textContent = msg;
    console.log('[Status]', msg);
  }

  // Utility: append to chat
  function appendChat(box, msg, from) {
    const div = document.createElement('div');
    div.textContent = (from ? from + ': ' : '') + msg;
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
  }

  // ---------- Full‑screen ----------
  function toggleFullscreen() {
    if (!document.fullscreenElement) {
      remoteVideo.requestFullscreen().then(() => {
        setStatus('Full‑screen enabled');
        fullscreenBtn.textContent = '⛶ Exit Full Screen';
      }).catch(err => {
        alert('Full‑screen error: ' + err.message);
        console.error('Fullscreen error:', err);
      });
    } else {
      document.exitFullscreen();
    }
  }
  document.addEventListener('fullscreenchange', () => {
    fullscreenBtn.textContent = document.fullscreenElement === remoteVideo ? '⛶ Exit Full Screen' : '⛶ Full Screen';
  });
  fullscreenBtn.onclick = toggleFullscreen;
  remoteVideo.addEventListener('dblclick', toggleFullscreen);

  // ---------- Host functions ----------
  function startHosting() {
    const id = prompt('Enter a Peer ID for this room (or leave blank for random):', '');
    peer = new Peer(id, {
      host: '0.peerjs.com',
      port: 443,
      path: '/',
      secure: true
    });
    peer.on('open', (assignedId) => {
      const displayId = id || assignedId;
      hostPeerIdDisplay.textContent = displayId;
      setStatus('Hosting. Your Peer ID: ' + displayId);
      home.classList.add('hidden');
      hostPanel.classList.remove('hidden');
      viewerPanel.classList.add('hidden');
      isHost = true;
      startCamBtn.disabled = false;
      startScreenBtn.disabled = false;

      // Listen for incoming data connections (viewers)
      peer.on('connection', (conn) => {
        connections.push(conn);
        updateViewerList();
        // Send our video stream if available
        if (localStream) {
          const call = peer.call(conn.peer, localStream);
        }
        conn.on('data', (data) => {
          try {
            const msg = JSON.parse(data);
            if (msg.type === 'chat') {
              appendChat(hostChat, msg.text, 'Viewer');
            } else if (msg.type === 'file') {
              receiveFile(hostChat, msg);
            }
          } catch (e) { console.warn('Non-JSON data:', data); }
        });
        // Store the connection and its peer ID for later reference
        conn.peerId = conn.peer;
      });

      // Listen for incoming audio calls from viewers
      peer.on('call', (call) => {
        // We only accept if the caller is one of our viewers (optional)
        // For simplicity, accept all and play audio
        call.answer(); // no stream from host, just receive
        call.on('stream', (remoteAudioStream) => {
          // Play the audio
          const audioEl = new Audio();
          audioEl.srcObject = remoteAudioStream;
          audioEl.autoplay = true;
          audioEl.volume = 1.0;
          // Store so we can mute later
          audioStreams.set(call.peer, remoteAudioStream);
          audioCalls.set(call.peer, call);
          // We might want to keep a reference to the audio element to stop it later
          // But we can just stop the track when muting.
          setStatus('Voice chat active from ' + call.peer);
        });
        call.on('close', () => {
          audioCalls.delete(call.peer);
          audioStreams.delete(call.peer);
          setStatus('Voice chat ended from ' + call.peer);
        });
      });
    });
    peer.on('error', (err) => {
      setStatus('Error: ' + err.message);
      console.error(err);
    });
  }

  // Update host's viewer list with mute controls (per viewer)
  function updateViewerList() {
    viewerCount.textContent = connections.length;
    viewerList.innerHTML = '';
    connections.forEach((conn, index) => {
      const div = document.createElement('div');
      div.className = 'viewer-item';
      const label = document.createElement('span');
      label.textContent = 'Viewer ' + (index + 1) + ' (' + conn.peer + ')';
      const muteBtn = document.createElement('button');
      muteBtn.textContent = '🔇 Mute';
      muteBtn.className = 'secondary';
      muteBtn.style.padding = '4px 10px';
      muteBtn.onclick = () => {
        // Toggle mute for this viewer's audio
        const stream = audioStreams.get(conn.peer);
        if (stream) {
          const enabled = stream.getAudioTracks()[0]?.enabled;
          if (enabled !== undefined) {
            stream.getAudioTracks().forEach(t => t.enabled = !t.enabled);
            muteBtn.textContent = stream.getAudioTracks()[0]?.enabled ? '🔇 Mute' : '🔊 Unmute';
          }
        } else {
          alert('No active voice chat from this viewer.');
        }
      };
      div.appendChild(label);
      div.appendChild(muteBtn);
      viewerList.appendChild(div);
    });
  }

  // Mute all audio
  muteAllAudioBtn.onclick = () => {
    let allMuted = true;
    audioStreams.forEach((stream) => {
      const track = stream.getAudioTracks()[0];
      if (track) {
        // If any track is enabled, we mute all; else unmute all
        if (track.enabled) allMuted = false;
      }
    });
    audioStreams.forEach((stream) => {
      stream.getAudioTracks().forEach(t => t.enabled = !allMuted);
    });
    muteAllAudioBtn.textContent = allMuted ? '🔇 Mute All Audio' : '🔊 Unmute All Audio';
    setStatus(allMuted ? 'All audio muted' : 'All audio unmuted');
  };

  // Camera start (unchanged)
  startCamBtn.onclick = async () => {
    try {
      localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
      localVideo.srcObject = localStream;
      setStatus('Camera/mic active.');
      for (const conn of connections) {
        const call = peer.call(conn.peer, localStream);
      }
    } catch (err) {
      setStatus('Could not access camera/mic: ' + err.message);
    }
  };

  // Screen share with 1080p60 toggle (unchanged)
  startScreenBtn.onclick = async () => {
    const useHighQuality = highQualityScreen.checked;
    let videoConstraints;
    if (useHighQuality) {
      videoConstraints = {
        width: { ideal: 1920 },
        height: { ideal: 1080 },
        frameRate: { ideal: 60 }
      };
    } else {
      videoConstraints = true;
    }
    try {
      const screenStream = await navigator.mediaDevices.getDisplayMedia({
        video: videoConstraints,
        audio: true
      });
      if (localStream) {
        localStream.getTracks().forEach(t => t.stop());
      }
      localStream = screenStream;
      localVideo.srcObject = localStream;
      setStatus(useHighQuality ? 'Screen sharing (1080p60)' : 'Screen sharing (default)');
      for (const conn of connections) {
        const call = peer.call(conn.peer, localStream);
        if (useHighQuality) {
          call.on('stream', () => {
            try {
              const senders = call.peerConnection.getSenders();
              const videoSender = senders.find(s => s.track && s.track.kind === 'video');
              if (videoSender) {
                const params = videoSender.getParameters();
                if (!params.encodings) params.encodings = [{}];
                params.encodings[0].maxBitrate = 8_000_000;
                videoSender.setParameters(params).catch(console.warn);
              }
            } catch (e) { /* ignore */ }
          });
        }
      }
    } catch (err) {
      setStatus('Screen share cancelled or failed: ' + err.message);
    }
  };

  stopHostBtn.onclick = () => {
    if (peer) { peer.destroy(); peer = null; }
    if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
    connections = [];
    audioCalls.clear();
    audioStreams.clear();
    localVideo.srcObject = null;
    hostChat.innerHTML = '';
    hostPeerIdDisplay.textContent = '---';
    viewerList.innerHTML = '';
    viewerCount.textContent = '0';
    hostPanel.classList.add('hidden');
    home.classList.remove('hidden');
    isHost = false;
    setStatus('Stopped hosting.');
  };

  copyPeerIdBtn.onclick = () => {
    const id = hostPeerIdDisplay.textContent;
    if (id && id !== '---') {
      navigator.clipboard.writeText(id).then(() => setStatus('Peer ID copied!'))
        .catch(() => {
          const range = document.createRange();
          range.selectNode(hostPeerIdDisplay);
          window.getSelection().removeAllRanges();
          window.getSelection().addRange(range);
          document.execCommand('copy');
          setStatus('Copied (fallback).');
        });
    }
  };

  hostSendChat.onclick = () => {
    const text = hostChatInput.value.trim();
    if (!text) return;
    const msg = JSON.stringify({ type: 'chat', text });
    for (const conn of connections) {
      if (conn.open) conn.send(msg);
    }
    appendChat(hostChat, text, 'You');
    hostChatInput.value = '';
  };
  hostChatInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') hostSendChat.click(); });

  hostSendFile.onclick = () => {
    const file = hostFileInput.files[0];
    if (!file) { alert('Select a file first.'); return; }
    const reader = new FileReader();
    reader.onload = (e) => {
      const data = e.target.result;
      const msg = { type: 'file', name: file.name, size: file.size, data: data };
      for (const conn of connections) {
        if (conn.open) conn.send(JSON.stringify(msg));
      }
      setStatus('File sent to all viewers.');
    };
    reader.readAsArrayBuffer(file);
  };

  function receiveFile(chatBox, msg) {
    const blob = new Blob([new Uint8Array(msg.data)], { type: 'application/octet-stream' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = msg.name;
    a.textContent = '📥 Download ' + msg.name;
    a.className = 'file-download';
    const div = document.createElement('div');
    div.appendChild(a);
    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
  }

  // ---------- Viewer functions ----------
  let viewerVoiceStream = null;
  let voiceCall = null;
  let isVoiceActive = false;

  function toggleVoice() {
    if (!window._viewerConn || !window._viewerConn.open) {
      alert('Not connected to host.');
      return;
    }
    if (isVoiceActive) {
      // Stop voice
      if (voiceCall) {
        voiceCall.close();
        voiceCall = null;
      }
      if (viewerVoiceStream) {
        viewerVoiceStream.getTracks().forEach(t => t.stop());
        viewerVoiceStream = null;
      }
      isVoiceActive = false;
      voiceChatBtn.textContent = '🎤 Voice Chat';
      voiceChatBtn.classList.remove('active');
      setStatus('Voice chat stopped');
    } else {
      // Start voice
      navigator.mediaDevices.getUserMedia({ audio: true })
        .then((audioStream) => {
          viewerVoiceStream = audioStream;
          // Call the host with audio only
          voiceCall = peer.call(window._viewerConn.peer, audioStream);
          voiceCall.on('close', () => {
            isVoiceActive = false;
            voiceChatBtn.textContent = '🎤 Voice Chat';
            voiceChatBtn.classList.remove('active');
            setStatus('Voice chat ended by host');
          });
          voiceCall.on('error', (err) => {
            console.error('Voice call error:', err);
            setStatus('Voice error: ' + err.message);
          });
          isVoiceActive = true;
          voiceChatBtn.textContent = '🔊 Voice Chat (ON)';
          voiceChatBtn.classList.add('active');
          setStatus('Voice chat active');
        })
        .catch((err) => {
          alert('Could not access microphone: ' + err.message);
          setStatus('Mic access denied');
        });
    }
  }

  voiceChatBtn.onclick = toggleVoice;

  function joinViewer(hostId) {
    if (!hostId) { alert('Please enter the Host Peer ID.'); return; }
    peer = new Peer({
      host: '0.peerjs.com',
      port: 443,
      path: '/',
      secure: true
    });
    peer.on('open', () => {
      setStatus('Viewer connected to signaling.');
      const conn = peer.connect(hostId);
      conn.on('open', () => {
        setStatus('Connected to host.');
        conn.on('data', (data) => {
          try {
            const msg = JSON.parse(data);
            if (msg.type === 'chat') {
              appendChat(viewerChat, msg.text, 'Host');
            } else if (msg.type === 'file') {
              receiveFile(viewerChat, msg);
            }
          } catch (e) { console.warn('Non-JSON data:', data); }
        });
        peer.on('call', (incoming) => {
          // This is the host's video call
          incoming.answer();
          incoming.on('stream', (stream) => {
            remoteVideo.srcObject = stream;
            setStatus('Receiving host video.');
          });
        });
        window._viewerConn = conn;
        // Enable voice button
        voiceChatBtn.disabled = false;
        viewerSendChat.disabled = false;
        viewerSendFile.disabled = false;
        disconnectBtn.disabled = false;
        connectBtn.disabled = true;
        home.classList.add('hidden');
        viewerPanel.classList.remove('hidden');
        hostPanel.classList.add('hidden');
        isHost = false;
      });
      conn.on('error', (err) => setStatus('Connection error: ' + err.message));
    });
    peer.on('error', (err) => setStatus('Peer error: ' + err.message));
  }

  disconnectBtn.onclick = () => {
    if (window._viewerConn) { window._viewerConn.close(); window._viewerConn = null; }
    if (peer) { peer.destroy(); peer = null; }
    remoteVideo.srcObject = null;
    viewerChat.innerHTML = '';
    // Stop voice if active
    if (isVoiceActive) {
      toggleVoice(); // will stop
    }
    viewerPanel.classList.add('hidden');
    home.classList.remove('hidden');
    setStatus('Disconnected.');
    connectBtn.disabled = false;
    disconnectBtn.disabled = true;
    viewerSendChat.disabled = true;
    viewerSendFile.disabled = true;
    voiceChatBtn.disabled = true;
    if (document.fullscreenElement) document.exitFullscreen();
  };

  viewerSendChat.onclick = () => {
    const conn = window._viewerConn;
    if (!conn || !conn.open) { alert('Not connected.'); return; }
    const text = viewerChatInput.value.trim();
    if (!text) return;
    const msg = JSON.stringify({ type: 'chat', text });
    conn.send(msg);
    appendChat(viewerChat, text, 'You');
    viewerChatInput.value = '';
  };
  viewerChatInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') viewerSendChat.click(); });

  viewerSendFile.onclick = () => {
    const conn = window._viewerConn;
    if (!conn || !conn.open) { alert('Not connected.'); return; }
    const file = viewerFileInput.files[0];
    if (!file) { alert('Select a file first.'); return; }
    const reader = new FileReader();
    reader.onload = (e) => {
      const data = e.target.result;
      const msg = { type: 'file', name: file.name, size: file.size, data: data };
      conn.send(JSON.stringify(msg));
      setStatus('File sent to host.');
    };
    reader.readAsArrayBuffer(file);
  };

  // ---------- Role selection ----------
  document.getElementById('btnHost').onclick = startHosting;

  document.getElementById('btnViewer').onclick = () => {
    const hostId = prompt('Enter the Host Peer ID:', '');
    if (hostId) {
      hostIdInput.value = hostId;
      joinViewer(hostId);
    }
  };

  connectBtn.onclick = () => {
    const hostId = hostIdInput.value.trim();
    if (hostId) joinViewer(hostId);
    else alert('Please enter a Host Peer ID.');
  };

  hostIdInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') connectBtn.click(); });

  // Initial disabled states
  viewerSendChat.disabled = true;
  viewerSendFile.disabled = true;
  disconnectBtn.disabled = true;
  voiceChatBtn.disabled = true;

  // Auto‑start host if URL has ?host=1
  if (new URLSearchParams(window.location.search).has('host')) {
    setTimeout(() => document.getElementById('btnHost').click(), 100);
  }
</script>
</body>
</html>
